<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My AI Chatbot</title>

  <style>
    body {
      background: #111827;
      color: white;
      font-family: Arial;
      display: flex;
      flex-direction: column;
      height: 100vh;
      margin: 0;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .message {
      margin-bottom: 15px;
      padding: 12px;
      border-radius: 12px;
      max-width: 80%;
    }

    .user {
      background: #2563eb;
      margin-left: auto;
    }

    .ai {
      background: #374151;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: #1f2937;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    button {
      margin-left: 10px;
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 16px;
    }
  </style>
</head>

<body>

  <div id="chat"></div>

  <div id="inputArea">
    <input id="messageInput" placeholder="메시지를 입력하세요">
    <button onclick="sendMessage()">전송</button>
  </div>

  <script>
    async function sendMessage() {

      const input = document.getElementById("messageInput");
      const chat = document.getElementById("chat");

      const userText = input.value;

      if (!userText) return;

      chat.innerHTML += `
        <div class="message user">
          ${userText}
        </div>
      `;

      input.value = "";

      const aiDiv = document.createElement("div");
      aiDiv.className = "message ai";
      aiDiv.innerText = "생각 중...";
      chat.appendChild(aiDiv);

      try {

        const response = await fetch(
          "https://api.openai.com/v1/chat/completions",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Authorization": "Bearer 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"
            },
            body: JSON.stringify({
              model: "gpt-4o-mini",
              messages: [
                {
                  role: "user",
                  content: userText
                }
              ]
            })
          }
        );

        const data = await response.json();

        aiDiv.innerText =
          data.choices[0].message.content;

      } catch (error) {

        aiDiv.innerText =
          "에러가 발생했습니다.";

      }

      chat.scrollTop = chat.scrollHeight;
    }
  </script>

</body>
</html>
